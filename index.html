<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Balance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <canvas id="c"></canvas>

    <div class="ov" id="score"><div class="sval" id="sVal">0</div></div>

    <div class="ov" id="controls">
      <button class="ctl" id="btnLeft"><svg width="18" height="18" viewBox="0 0 24 24"><polygon points="17,3 17,21 4,12" fill="#b4b0ac"/></svg></button>
      <button class="ctl" id="btnRotL"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#b4b0ac" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2.5 5 2.5 10.5 8 10.5"/><path d="M4 15.5a8.5 8.5 0 1 0 2-9L2.5 10.5"/></svg></button>
      <button class="ctl drop" id="btnDrop"><svg width="22" height="22" viewBox="0 0 24 24"><polygon points="3,5 21,5 12,19" fill="#ccc8c4"/></svg></button>
      <button class="ctl" id="btnRotR"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#b4b0ac" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21.5 5 21.5 10.5 16 10.5"/><path d="M20 15.5a8.5 8.5 0 1 1-2-9L21.5 10.5"/></svg></button>
      <button class="ctl" id="btnRight"><svg width="18" height="18" viewBox="0 0 24 24"><polygon points="7,3 7,21 20,12" fill="#b4b0ac"/></svg></button>
    </div>

    <div class="panel" id="over"><div class="card">
      <div class="rsn">game over</div>
      <div class="big" id="ovStones">0</div>
      <div class="btns"><button class="pri" id="ovBtn">play again</button></div>
    </div></div>

    <div class="panel" id="intro"><div class="card">
      <div class="rsn">brutal</div>
      <div class="intro-art">
        <svg viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <g fill="#8e8c8a" stroke="#111" stroke-width="2" stroke-linejoin="round">
            <rect x="24" y="86" width="72" height="16"/>
            <rect x="34" y="66" width="52" height="18" transform="rotate(-3 60 75)"/>
            <rect x="42" y="46" width="42" height="18" transform="rotate(4 60 55)"/>
            <rect x="50" y="26" width="30" height="18" transform="rotate(-2 60 35)"/>
          </g>
        </svg>
      </div>
      <div class="intro-head">Build the tallest tower</div>
      <p class="intro-copy">Steer each falling block and drop it onto the stack. The higher you build, the higher your score &mdash; but if any block topples to the floor, it&rsquo;s game over.</p>
      <div class="intro-hints">
        <div class="intro-hint"><span class="chip"><svg class="solid" width="28" height="18" viewBox="0 0 40 24"><polygon points="13,3 13,21 2,12"/><polygon points="27,3 27,21 38,12"/></svg></span><span class="lab">move</span></div>
        <div class="intro-hint"><span class="chip"><svg width="20" height="20" viewBox="0 0 24 24"><polyline points="21.5 5 21.5 10.5 16 10.5"/><path d="M20 15.5a8.5 8.5 0 1 1-2-9L21.5 10.5"/></svg></span><span class="lab">rotate</span></div>
        <div class="intro-hint"><span class="chip"><svg class="solid" width="20" height="20" viewBox="0 0 24 24"><polygon points="3,5 21,5 12,19"/></svg></span><span class="lab">drop</span></div>
      </div>
      <div class="btns"><button class="pri" id="introBtn">begin</button></div>
    </div></div>

    <div id="boot">balancing&hellip;</div>
  </div>

<script type="importmap">
{ "imports": { "@dimforge/rapier2d-compat": "https://esm.sh/@dimforge/rapier2d-compat@0.14.0" } }
</script>
<script type="module" src="game.js"></script>
  <script async data-id="101507205" src="//static.getclicky.com/js"></script>
</body>
</html>
